<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTube OAuth Callback</title>
</head>
<body>
  <p>Finishing FocusTube sign-in…</p>
  <script>
    (function () {
      if (window.opener) {
        window.opener.postMessage({ type: 'focustube-oauth-callback', query: window.location.search }, 'https://focustube.web.app');
      }
      document.body.innerHTML = '<p>Finishing FocusTube sign-in… You can return to the app.</p>';
    })();
  </script>
</body>
</html>
