<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTube OAuth Callback</title>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.5; text-align: center; }
    .btn { display: inline-block; padding: 12px 24px; background-color: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    .btn:hover { background-color: #0056b3; }
    #fallback-link { display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Finishing FocusTube sign-in…</h2>
  <div id="status">Connecting to token service…</div>
  <script>
    (async function () {
      const status = document.getElementById('status');
      const query = window.location.search;
      
      // Dynamically determine the base URL (works for both NGROK and Tailscale)
      const baseUrl = window.location.origin;
      const tokenServiceBase = localStorage.getItem('ct_token_service_base') || `${baseUrl}/focustube-token`;
      
      try {
        // 1. Finalize the OAuth exchange locally
        status.textContent = 'Finalizing sign-in with token service…';
        const finalize = await fetch(`${tokenServiceBase}/oauth/finalize`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: query.replace(/^\?/, '')
        });
        if (!finalize.ok) throw new Error('Finalize failed');
        
        // 2. Refresh access token for the app
        status.textContent = 'Refreshing access token…';
        const sessionId = localStorage.getItem('ct_session_id_v1') || '';
        const refresh = await fetch(`${tokenServiceBase}/token/refresh`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
        if (!refresh.ok) throw new Error('Token refresh failed');
        const data = await refresh.json();
        
        // 3. Save session data
        localStorage.setItem('ct_access_token', data.accessToken || '');
        localStorage.setItem('ct_token_expiry', String(Date.now() + ((data.expiresIn || 3600) * 1000) - 15000));
        
        // 4. Success state
        status.textContent = 'Sign-in complete!';
      } catch (err) {
        status.textContent = `Sign-in failed: ${err.message}`;
      }

      // 5. Auto-redirect and fallback (works on iPhone and Desktop)
      status.innerHTML = 'Authorization complete. Redirecting to FocusTube in 2 seconds…';
      
      // Add the manual button fallback
      const manualBtn = document.createElement('a');
      manualBtn.href = baseUrl + '/';
      manualBtn.className = 'btn';
      manualBtn.innerText = 'Return to FocusTube';
      manualBtn.id = 'fallback-link';
      document.body.appendChild(manualBtn);

      // Attempt auto-redirect
      setTimeout(() => { 
        window.location.replace(baseUrl + '/'); // replace() prevents getting stuck in a back-history loop
      }, 2000);
    })();
  </script>
</body>
</html>
